# Stage-1 fridge vision config
# Lines use key = value. CLI options still override roi and roi_id.

roi_id = main_compartment
# Use 0,0,0,0 to keep full-frame mode before a fixed fridge ROI is calibrated.
roi = 0,0,0,0

# ROI motion
pixel_delta_threshold = 8
min_region_area_pixels = 4

# Stable -> disturbance -> stable selector
stable_ratio_threshold = 0.004
motion_ratio_threshold = 0.015
black_frame_mean_threshold = 5.0
min_stable_run_frames = 2

# Event detector
no_change_ratio = 0.010
event_ratio = 0.040
partial_ratio = 0.020
signed_delta_threshold = 10.0
dominant_polarity_threshold = 0.68
reorg_balance_threshold = 0.62
background_like_threshold = 12.0
region_direction_margin = 10.0
reorg_region_threshold = 2
