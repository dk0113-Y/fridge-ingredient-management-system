# 模块 1：事件检测与关键帧提取
# 配置格式统一为 key = value
# 如果命令行显式传入 roi 或 roi_id，会覆盖这里的默认值

# 冰箱区域标识
roi_id = main_compartment

# 关注区域，格式为 x,y,width,height
# 0,0,0,0 表示整帧
roi = 0,0,0,0

# ROI 运动检测参数
# 像素变化阈值，越大越不敏感
pixel_delta_threshold = 8

# 变化区域的最小像素面积，小于该值的噪声会被忽略
min_region_area_pixels = 4

# 稳定帧 -> 扰动帧 -> 稳定帧 的关键帧选择参数
# 稳定状态下允许的最大运动比例
stable_ratio_threshold = 0.004

# 判定为发生明显运动的比例阈值
motion_ratio_threshold = 0.015

# 近似黑帧的平均亮度阈值，用于过滤无效帧
black_frame_mean_threshold = 5.0

# 至少连续多少帧稳定后，才认为前后状态可靠
min_stable_run_frames = 2

# 当前主链路仍在使用的第一阶段启发式事件判定参数
# 小于该变化比例时，判为 no_change
no_change_ratio = 0.010

# 超过该变化比例时，认为存在有效事件信号
event_ratio = 0.040

# 处于中间区间时，可能进入 partial_take_out_candidate
partial_ratio = 0.020

# 有符号亮度差阈值，用于区分放入/取出方向
signed_delta_threshold = 10.0

# 主导亮度变化方向的占比阈值
dominant_polarity_threshold = 0.68

# 重新整理而非真正取放时的平衡阈值
reorg_balance_threshold = 0.62

# 与背景足够接近时，认为更像“空位”或“背景”
background_like_threshold = 12.0

# 区域方向判断的亮度差边界
region_direction_margin = 10.0

# 至少多少个变化区域才更可能是整理行为
reorg_region_threshold = 2
