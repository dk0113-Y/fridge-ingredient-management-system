# 模块 2：YOLO 运行时与差分分析配置

# --- 模型运行时 ---
# ONNX 模型路径
model_path = models/best.onnx

# 粗分类类别顺序，必须与模型输出的类别索引一致
class_names = packaged_food, fruit_vegetable, meat_egg_fresh, drink

# 模型输入宽高
input_width = 640
input_height = 640

# 检测分数阈值，低于该值的框会被丢弃
score_threshold = 0.25

# NMS 阈值，当前主要作为运行时参数保留
nms_threshold = 0.45

# ONNX 单个检测结果的列数
# 当前约定为 [x1, y1, x2, y2, score, class_id]
output_columns = 6

# --- 差分分析 ---
# 进入差分分析前，检测框本身的最低置信度
confidence_threshold = 0.50

# 前后同类框的 IoU 匹配阈值
iou_match_threshold = 0.30

# 当 IoU 不够时，允许用中心点距离补充匹配
center_distance_threshold = 0.45
reorganize_center_distance_threshold = 0.18

# 果蔬类前后框面积变化超过该比例时，可判为部分取出候选
partial_area_change_threshold = 0.20

# 果蔬类裁剪区域前后像素平均差超过该值时，可判为部分取出候选
partial_visual_delta_threshold = 18.0

# 未匹配框占比过高时，整体事件转为 uncertain
uncertain_unmatched_ratio_threshold = 0.50
